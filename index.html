<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ちゃちゃ ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e7e9ea;
      min-height: 100vh;
      padding: 16px;
    }

    /* パスワード画面 */
    #lock-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    #lock-screen h1 { font-size: 1.4rem; margin-bottom: 24px; color: #e91e8c; }
    #lock-screen input {
      width: 100%; max-width: 320px; padding: 14px; border-radius: 12px;
      border: 1px solid #333; background: #1e2732; color: #e7e9ea;
      font-size: 1rem; text-align: center; margin-bottom: 12px;
    }
    #lock-screen button {
      width: 100%; max-width: 320px; padding: 14px; border-radius: 12px;
      border: none; background: #e91e8c; color: #fff; font-size: 1rem; font-weight: bold; cursor: pointer;
    }
    #lock-error { color: #f4212e; margin-top: 10px; font-size: 0.9rem; }

    /* タブナビ */
    #app { display: none; max-width: 520px; margin: 0 auto; }
    .nav-tabs {
      display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px;
      overflow-x: auto;
    }
    .nav-tab {
      padding: 8px 18px; border-radius: 20px; border: 1px solid #333;
      background: #1a1a1a; color: #888; font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .nav-tab.active { background: #e91e8c; border-color: #e91e8c; color: #fff; }

    #tab-post { display: block; }
    h2 { font-size: 1.2rem; margin-bottom: 16px; color: #e91e8c; text-align: center; }
    .section { margin-bottom: 16px; }
    label { font-size: 0.85rem; color: #71767b; display: block; margin-bottom: 6px; }
    select, textarea {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333;
      background: #1e2732; color: #e7e9ea; font-size: 0.95rem;
    }
    select { height: 48px; }
    textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
    .char-count { text-align: right; font-size: 0.8rem; margin-top: 4px; color: #71767b; }
    .char-count.over { color: #f4212e; }
    .btn-primary {
      width: 100%; padding: 16px; border-radius: 12px; border: none;
      background: #e91e8c; color: #fff; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px;
    }
    .btn-primary:disabled { background: #333; color: #71767b; cursor: not-allowed; }
    .btn-outline {
      width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e91e8c;
      background: transparent; color: #e91e8c; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px;
    }
    .btn-sub {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333;
      background: transparent; color: #71767b; font-size: 0.9rem; cursor: pointer;
    }
    #post-status { text-align: center; font-size: 0.85rem; color: #71767b; margin-top: 8px; min-height: 20px; }
    #post-status.error { color: #f4212e; }
    #post-status.success { color: #00ba7c; }
    .spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid #fff;
      border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .settings-toggle {
      text-align: center; margin-top: 16px; font-size: 0.8rem; color: #71767b; cursor: pointer; text-decoration: underline;
    }
    #settings-panel {
      display: none; margin-top: 12px; padding: 12px; border: 1px solid #333; border-radius: 12px;
    }
    #settings-panel input {
      width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
      background: #0f1117; color: #e7e9ea; font-size: 0.85rem; font-family: monospace; margin-top: 6px;
    }
    .btn-save-key {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      background: #333; color: #e7e9ea; font-size: 0.85rem; cursor: pointer; margin-top: 8px;
    }

    /* 承認タブ */
    #tab-approve { display: none; }
    .approve-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .approve-header h2 { margin-bottom: 0; }
    .stats-text { font-size: 12px; color: #555; }
    .sub-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .sub-tab {
      padding: 6px 14px; border-radius: 16px; border: 1px solid #333;
      background: #1a1a1a; color: #666; font-size: 13px; cursor: pointer;
    }
    .sub-tab.active { background: #e91e8c; border-color: #e91e8c; color: #fff; }

    .draft-card {
      background: #1a1a1a; border: 1px solid #222; border-radius: 14px;
      padding: 14px; margin-bottom: 10px;
    }
    .draft-card.approved { border-color: #00c853; }
    .draft-card.posted { opacity: 0.5; }
    .draft-meta { font-size: 11px; color: #555; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .badge-pending { background: #222; color: #666; }
    .badge-approved { background: #00c85322; color: #00c853; }
    .badge-posted { background: #1a1a1a; color: #444; }
    .draft-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .draft-edit {
      width: 100%; background: #111; color: #eee; border: 1px solid #333; border-radius: 8px;
      padding: 10px; font-size: 14px; line-height: 1.6; margin-top: 10px; resize: vertical;
      min-height: 100px; display: none; font-family: inherit;
    }
    .card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .ca-btn { padding: 6px 14px; border-radius: 14px; border: none; font-size: 13px; cursor: pointer; }
    .ca-approve { background: #00c853; color: #fff; }
    .ca-unapprove { background: #333; color: #aaa; }
    .ca-edit { background: #222; color: #888; border: 1px solid #333; }
    .ca-delete { background: #222; color: #ff4444; border: 1px solid #ff444433; }
    .empty-msg { text-align: center; padding: 32px; color: #444; font-size: 14px; }
    .loading-msg { text-align: center; padding: 32px; color: #555; }

    .save-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222;
      padding: 12px 16px; display: none; justify-content: space-between; align-items: center;
    }
    .save-bar.visible { display: flex; }
    .save-bar span { font-size: 13px; color: #888; }
    .btn-save-all {
      background: #00c853; color: #fff; padding: 10px 22px; border-radius: 20px;
      border: none; font-size: 14px; cursor: pointer; font-weight: bold;
    }
    .gh-token-area { margin-bottom: 14px; }
    .gh-token-area input {
      width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
      background: #111; color: #eee; font-size: 13px; font-family: monospace; margin-top: 4px;
    }
    .gh-token-area button {
      margin-top: 6px; padding: 8px 16px; border-radius: 8px; border: none;
      background: #333; color: #eee; font-size: 13px; cursor: pointer;
    }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #222; color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
    .pb80 { height: 80px; }

    .post-card {
      background: #1a1a1a; border: 1px solid #222; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 10px;
    }
    .post-card-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #e7e9ea; }
    .post-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .post-card-len { font-size: 11px; }
    .post-card-len.over { color: #f4212e; }
    .post-card-len.ok { color: #555; }
    .btn-copy-post {
      padding: 4px 12px; border-radius: 12px; border: 1px solid #333;
      background: transparent; color: #888; font-size: 12px; cursor: pointer;
    }

    .comment-section-title {
      font-size: 13px; color: #555; margin: 16px 0 8px; padding-bottom: 4px;
      border-bottom: 1px solid #222;
    }
    .comment-card {
      background: #1a1a1a; border: 1px solid #222; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 8px; position: relative;
    }
    .comment-card.humor { border-left: 3px solid #f59e0b; }
    .comment-card.serious { border-left: 3px solid #e91e8c; }
    .comment-text { font-size: 14px; line-height: 1.6; color: #e7e9ea; white-space: pre-wrap; }
    .comment-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .comment-len { font-size: 11px; color: #555; }
    .btn-copy-comment {
      padding: 4px 12px; border-radius: 12px; border: 1px solid #333;
      background: transparent; color: #888; font-size: 12px; cursor: pointer;
    }

    .kw-section { margin-bottom: 16px; }
    .kw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .kw-header label { font-size: 0.85rem; color: #71767b; }
    .kw-header span { font-size: 12px; color: #555; cursor: pointer; text-decoration: underline; }
    .kw-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; max-height: 160px; overflow-y: auto; }
    .kw-tag {
      padding: 5px 12px; border-radius: 20px; border: 1px solid #333;
      background: #1a1a1a; color: #888; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .kw-tag .kw-del { color: #444; font-size: 11px; }
    .kw-add-row { display: flex; gap: 6px; }
    .kw-add-input {
      flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #333;
      background: #1a1a1a; color: #eee; font-size: 13px;
    }
    .kw-add-btn {
      padding: 8px 16px; border-radius: 20px; border: none;
      background: #333; color: #eee; font-size: 13px; cursor: pointer;
    }
    #comment-status, #reply-status, #quote-status {
      text-align: center; font-size: 0.85rem; color: #71767b; margin: 8px 0; min-height: 20px;
    }
    #comment-status.error, #reply-status.error, #quote-status.error { color: #f4212e; }
    #comment-status.success, #reply-status.success, #quote-status.success { color: #00ba7c; }
  </style>
</head>
<body>

<!-- パスワード画面 -->
<div id="lock-screen">
  <h1>💕 ちゃちゃ ツール</h1>
  <input type="password" id="password-input" placeholder="パスワードを入力" />
  <button onclick="unlock()">ログイン</button>
  <div id="lock-error"></div>
</div>

<!-- メイン -->
<div id="app">
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchNav('post')">✍️ ポスト作成</div>
    <div class="nav-tab" onclick="switchNav('comment')">💬 コメント</div>
    <div class="nav-tab" onclick="switchNav('reply')">↩️ 返信</div>
    <div class="nav-tab" onclick="switchNav('quote')">🔁 引用リプ</div>
    <div class="nav-tab" onclick="switchNav('viral')">🔥 バズ投稿</div>
    <div class="nav-tab" onclick="switchNav('approve')">✅ 承認</div>
  </div>

  <!-- ポスト作成 -->
  <div id="tab-post">
    <h2>✍️ ポスト作成</h2>
    <div class="section">
      <label>テーマ（任意）</label>
      <select id="theme">
        <option value="">ミックス（全タイプ）</option>
        <option value="A">A｜一言刺さり系（30〜50字）</option>
        <option value="B">B｜逆張り・恋愛常識否定系（80〜120字）</option>
        <option value="C">C｜共感爆発→本音系（100〜150字）</option>
        <option value="D">D｜コメント誘発・問いかけ系（80〜120字）</option>
        <option value="E">E｜プロフィール自然誘導（100〜150字）</option>
      </select>
    </div>
    <div class="kw-section">
      <div class="kw-header">
        <label>キーワード（タップで追加）</label>
        <span onclick="resetKeywords()">リセット</span>
      </div>
      <div class="kw-tags" id="kw-tags"></div>
      <div class="kw-add-row">
        <input class="kw-add-input" id="kw-input" placeholder="キーワードを手動追加..." />
        <button class="kw-add-btn" onclick="addKeyword()">追加</button>
      </div>
    </div>
    <div class="section">
      <label>メモ・キーワード（タップで選択 or 手動入力）</label>
      <textarea id="memo" placeholder="例：既読スルー、目を合わせられない、感情のマナー..." rows="3"></textarea>
    </div>
    <button class="btn-primary" id="btn-generate" onclick="generate()">AIでポストを生成</button>
    <div id="post-list"></div>
    <button class="btn-sub" onclick="generate()" style="margin-top:8px;">もう一度生成</button>
    <div id="post-status"></div>
    <div class="settings-toggle" onclick="toggleSettings()">⚙️ API設定</div>
    <div id="settings-panel">
      <label>Anthropic API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." />
      <button class="btn-save-key" onclick="saveApiKey()">保存</button>
    </div>
  </div>

  <!-- コメント作成 -->
  <div id="tab-comment" style="display:none;">
    <h2>💬 コメント作成</h2>
    <div class="section">
      <label>コメントしたい投稿を貼り付け</label>
      <textarea id="target-post" placeholder="相手の投稿文をここに貼り付けてください..." rows="5"></textarea>
    </div>
    <button class="btn-primary" id="btn-comment" onclick="generateComments()">コメントを生成</button>
    <div id="comment-status"></div>
    <div id="comment-results"></div>
  </div>

  <!-- 返信作成 -->
  <div id="tab-reply" style="display:none;">
    <h2>↩️ 返信作成</h2>
    <div class="section">
      <label>元のポスト</label>
      <textarea id="original-post" placeholder="自分の投稿文をここに貼り付けてください..." rows="4"></textarea>
    </div>
    <div class="section">
      <label>届いたコメント</label>
      <textarea id="received-comment" placeholder="返信したいコメントをここに貼り付けてください..." rows="3"></textarea>
    </div>
    <button class="btn-primary" id="btn-reply" onclick="generateReplies()">返信を生成</button>
    <div id="reply-status"></div>
    <div id="reply-results"></div>
  </div>

  <!-- 引用リプ作成 -->
  <div id="tab-quote" style="display:none;">
    <h2>🔁 引用リプ作成</h2>
    <div class="section">
      <label>引用したい相手のポスト</label>
      <textarea id="quote-post" placeholder="引用したいポストをここに貼り付けてください..." rows="5"></textarea>
    </div>
    <button class="btn-primary" id="btn-quote" onclick="generateQuotes()">引用リプを生成</button>
    <div id="quote-status"></div>
    <div id="quote-results"></div>
  </div>

  <!-- バズ投稿 -->
  <div id="tab-viral" style="display:none;">
    <h2>🔥 バズ投稿 登録</h2>
    <div style="background:#1a1a1a;border:1px solid #e91e8c33;border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:#888;line-height:1.6;">
      ⚠️ 他者の投稿を貼り付けてください。<br>
      Claudeが<strong style="color:#e91e8c">パターンのみ</strong>を分析・学習します。<br>
      文章のコピーは一切行わず、ちゃちゃの言葉で独自に生成します。
    </div>
    <div class="section">
      <label>バズっている投稿を貼り付け</label>
      <textarea id="viral-input" placeholder="バズっている投稿をここに貼り付けてください..." rows="6"></textarea>
    </div>
    <button class="btn-primary" id="btn-viral" onclick="analyzeViral()">分析して登録</button>
    <div id="viral-status" style="text-align:center;font-size:0.85rem;color:#71767b;margin:8px 0;min-height:20px;"></div>
    <div id="viral-analysis-result"></div>
    <div style="margin-top:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:13px;font-weight:600;color:#888;">登録済みパターン</span>
        <span id="viral-count" style="font-size:12px;color:#555;"></span>
      </div>
      <div id="viral-list"></div>
    </div>
  </div>

  <!-- 投稿承認 -->
  <div id="tab-approve">
    <div class="approve-header">
      <h2>✅ 投稿承認</h2>
      <div class="stats-text" id="stats-bar">-</div>
    </div>
    <div class="gh-token-area" id="gh-token-area">
      <label style="font-size:12px;color:#555;">GitHub Token（初回のみ）</label>
      <input type="password" id="gh-token-input" placeholder="ghp_..." />
      <button onclick="saveGhToken()">保存して読み込む</button>
    </div>
    <div class="sub-tabs">
      <div class="sub-tab active" onclick="switchSubTab('pending')">未承認</div>
      <div class="sub-tab" onclick="switchSubTab('approved')">承認済</div>
      <div class="sub-tab" onclick="switchSubTab('posted')">投稿済</div>
    </div>
    <div id="draft-list"><div class="loading-msg">GitHubトークンを入力してください</div></div>
    <div class="pb80"></div>
  </div>
</div>

<div class="save-bar" id="save-bar">
  <span id="save-bar-text">変更あり</span>
  <button class="btn-save-all" onclick="saveAll()">保存して確定</button>
</div>

<div class="toast" id="toast"></div>

<script>
const PASSWORD = "haruku1225";
const OWNER = "12256384a-bot";
const REPO = "chacha-threads";
const FILE_PATH = "drafts.json";

const DEFAULT_KEYWORDS = [
  // 体験・ストーリー系
  "既読スルーされた夜","友達止まりで終わった","目を合わせられなかった","緊張して何も言えなかった","好きな人の前で空回り",
  "察してほしかった頃","不機嫌を隠せなかった","感情をぶつけてしまった","依存してた恋愛","一方的に好きだった",
  // 心理学・気づき系
  "感情のマナー","自分の機嫌は自分でとる","察してアピール","感情の垂れ流し","依存と癒やしの違い",
  "自己肯定感と恋愛","不安愛着","回避型","心理的安全性","承認欲求",
  // 恋愛悩み系
  "好きな人に既読スルー","友達止まり","告白できない","目を合わせられない","会話が続かない",
  "自己肯定感ゼロ","恋愛が怖い","傷つきたくない","また失敗するかも","自分には無理",
  // 変化・成長系
  "小さな実践を積んだ","心理学を学んでから","自然に話せるようになった","緊張が減った","素直に気持ちを伝えた",
  "ありのままでいられた","相手を信頼できた","感情を整えられた","余裕が生まれた","変われた実感",
  // 逆張り・気づき系
  "好かれようとするほど","テクニックより先に","モテる方法より","見た目より大事なこと","努力の方向が違った",
  "恋愛は設計より感情","不安を隠すほど","完璧に見せようとすると","正直に言った方が","弱さを見せた方が",
  // 検索ワード系
  "恋愛 苦手","好きな人 既読スルー","友達止まり 脱出","告白 怖い","自己肯定感 低い 恋愛",
  "恋愛 心理学","会話 続かない","緊張 好きな人","恋愛 自信ない","モテない 理由",
  // 女性が共感しやすい感情・場面
  "返信が来なくて不安","既読がついてから何時間も","好きな人に素直になれない","また気を使いすぎた","相手に合わせすぎた",
  "好きな人の前で本音が言えない","嫌われたくなくて","ずっと待ってた","もっと大切にされたい","自分を後回しにしてた",
  // 女性向け心理ワード
  "不安型愛着","恋愛依存","自分軸","感情的にならない","境界線を引く",
  "好きだから我慢してた","言いたいことが言えない","恋愛で自己肯定感が下がる","大切にされる恋愛","対等な関係",
  // プロフィール誘導系
  "プロフィールに書いてます","気になる人はプロフィール","詳しくはプロフィールへ","noteに書いてます","実践記を更新中"
];

let keywords = JSON.parse(localStorage.getItem('chacha_kw_list') || 'null') || [...DEFAULT_KEYWORDS];

function saveKeywordsToStorage() { localStorage.setItem('chacha_kw_list', JSON.stringify(keywords)); }

function renderKeywords() {
  const container = document.getElementById('kw-tags');
  container.innerHTML = keywords.map((kw, i) => `
    <div class="kw-tag" onclick="selectKeyword('${kw.replace(/'/g,"\\'")}')">
      <span>${kw}</span>
      <span class="kw-del" onclick="event.stopPropagation();deleteKeyword(${i})">✕</span>
    </div>
  `).join('');
}

function selectKeyword(kw) {
  const memo = document.getElementById('memo');
  memo.value = memo.value.trim() ? memo.value.trim() + '、' + kw : kw;
}
function addKeyword() {
  const input = document.getElementById('kw-input');
  const val = input.value.trim();
  if (!val) return;

let _posts = [];

  const list = document.getElementById('post-list');

  list.innerHTML = posts.map((p, i) => {
    const over = p.length > 500;
    return `
      <div class="post-card">
        <div class="post-card-text" id="ptext-${i}">${esc(p)}</div>
        <textarea class="draft-edit" id="pedit-${i}" style="display:none">${esc(p)}</textarea>

          <div style="display:flex;gap:6px;">

            <button class="btn-copy-post" onclick="copyPost(${i})">コピー</button>

      </div>`;
  }).join('');
}

function togglePostEdit(i) {
  const textEl = document.getElementById(`ptext-${i}`);
  const editEl = document.getElementById(`pedit-${i}`);
  const btnEl = document.getElementById(`pebtn-${i}`);

    textEl.innerHTML = esc(_posts[i]);
    editEl.style.display = 'none'; textEl.style.display = 'block'; btnEl.textContent = '編集';
  } else {

async function generate() {
  const apiKey = getApiKey();
  if (!apiKey) {
    setPostStatus('⚙️ API設定からAPIキーを入力してください', 'error');
    document.getElementById('settings-panel').style.display = 'block';
    return;
  }
  const theme = document.getElementById('theme').value;
  const memo = document.getElementById('memo').value.trim();
  const btn = document.getElementById('btn-generate');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>生成中...';
  setPostStatus(''); document.getElementById('post-list').innerHTML = '';

  const typeGuide = {
    'A': 'タイプA（一言刺さり系）のみ10件。30〜50字。結論だけ言い切る。',
    'B': 'タイプB（逆張り・恋愛常識否定系）のみ10件。80〜120字。',
    'C': 'タイプC（共感爆発→本音系）のみ10件。100〜150字。',
    'D': 'タイプD（コメント誘発・問いかけ系）のみ10件。80〜120字。最後に自然な問いかけで締める。',
    'E': 'タイプE（プロフィール自然誘導）のみ10件。100〜150字。最後の1文でプロフィールへ誘導。',
  };
  let userPrompt = theme
    ? `${typeGuide[theme]}各投稿を「---」で区切って出力してください。`
    : 'A〜Eのタイプをミックスして10件生成してください。各投稿を「---」で区切って出力してください。';
  if (memo) userPrompt += `\n参考にするキーワード・ネタ: ${memo}`;

  try {
    const { default: Anthropic } = await import('https://esm.sh/@anthropic-ai/sdk');
    const client = new Anthropic({ apiKey, dangerouslyAllowBrowser: true });
    const message = await client.messages.create({
      model: 'claude-sonnet-4-6', max_tokens: 2048,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: userPrompt }]
    });
    const raw = message.content[0].text.trim();
    _posts = raw.split('---').map(p => p.trim()).filter(Boolean);
    renderPosts(_posts);
    setPostStatus(`${_posts.length}件生成完了！`, 'success');
  } catch (e) {
    setPostStatus(`エラー: ${e.message}`, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = 'AIでポストを生成';
  }
}

const VIRAL_FILE_PATH = 'viral_examples.json';
let viralExamples = [], viralSha = '';

async function loadViral() {
  const token = localStorage.getItem('chacha_gh_token');
  if (!token) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${VIRAL_FILE_PATH}`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    const data = await res.json();
    viralSha = data.sha;
    const decoded = new TextDecoder('utf-8').decode(Uint8Array.from(atob(data.content.replace(/\n/g,'')), c=>c.charCodeAt(0)));
    viralExamples = JSON.parse(decoded);
    renderViral();
  } catch(e) { console.error('viral load error', e); }
}

async function saveViral() {
  const token = localStorage.getItem('chacha_gh_token');
  if (!token) return;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(viralExamples, null, 2))));
  const body = { message: 'chore: バズ投稿パターン更新', content, sha: viralSha };
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${VIRAL_FILE_PATH}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (res.ok) { const data = await res.json(); viralSha = data.content.sha; }
}

        `- emotion: 感情トリガー（共感/驚き/不安/希望/笑い/怒り のいずれか）\n` +
        `- structure: 投稿の構造を1行で（例: 冒頭で問題提起→体験談→余韻で締め）\n` +
        `- key_elements: バズる要因を2〜3個（文字列の配列）\n` +
        `- char_count: 文字数（整数）\n\nJSON以外は絶対に出力しないこと。`
      }]
    });
    let analysis;
    try { analysis = JSON.parse(message.content[0].text.trim()); }
    catch(e) { analysis = { hook_type:'不明', emotion:'不明', structure:'分析エラー', key_elements:[], char_count: text.length }; }

    const newEntry = {
      id: viralExamples.length ? viralExamples[viralExamples.length-1].id + 1 : 1,
      text,
      analysis,
      added_at: new Date().toISOString()
    };
    viralExamples.push(newEntry);
    await saveViral();
    renderViral();
    document.getElementById('viral-input').value = '';

    // 分析結果を表示
    const tags = [
      `<span style="background:#e91e8c22;color:#e91e8c;padding:3px 8px;border-radius:6px;font-size:12px;">🪝 ${analysis.hook_type}</span>`,
      `<span style="background:#1d9bf022;color:#1d9bf0;padding:3px 8px;border-radius:6px;font-size:12px;">💬 ${analysis.emotion}</span>`,
      `<span style="background:#00c85322;color:#00c853;padding:3px 8px;border-radius:6px;font-size:12px;">📏 ${analysis.char_count}字</span>`,
      ...(analysis.key_elements||[]).map(e=>`<span style="background:#f59e0b22;color:#f59e0b;padding:3px 8px;border-radius:6px;font-size:12px;">✨ ${e}</span>`)
    ].join(' ');
    document.getElementById('viral-analysis-result').innerHTML = `
      <div style="background:#1a1a1a;border:1px solid #00c853;border-radius:12px;padding:12px;margin-bottom:12px;">
        <div style="font-size:12px;color:#00c853;margin-bottom:8px;">✅ 登録完了・パターン分析結果</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${tags}</div>
        <div style="font-size:12px;color:#666;">構造: ${analysis.structure}</div>
      </div>`;
    setViralStatus('登録完了！次回の自動生成に反映されます', 'success');
  } catch(e) {
    setViralStatus(`エラー: ${e.message}`, 'error');
  } finally {
    btn.disabled = false; btn.innerHTML = '分析して登録';
  }
}

function renderViral() {
  document.getElementById('viral-count').textContent = `${viralExamples.length}件登録済み`;
  const list = document.getElementById('viral-list');
  if (!viralExamples.length) { list.innerHTML = '<div style="text-align:center;padding:24px;color:#444;font-size:14px;">まだ登録されていません</div>'; return; }
  list.innerHTML = [...viralExamples].reverse().map(v => {
    const a = v.analysis || {};
    const tags = [
      a.hook_type && `<span style="background:#e91e8c22;color:#e91e8c;padding:2px 6px;border-radius:5px;font-size:11px;">🪝 ${a.hook_type}</span>`,
      a.emotion && `<span style="background:#1d9bf022;color:#1d9bf0;padding:2px 6px;border-radius:5px;font-size:11px;">💬 ${a.emotion}</span>`,
      a.char_count && `<span style="background:#333;color:#888;padding:2px 6px;border-radius:5px;font-size:11px;">📏 ${a.char_count}字</span>`,
      ...(a.key_elements||[]).map(e=>`<span style="background:#f59e0b22;color:#f59e0b;padding:2px 6px;border-radius:5px;font-size:11px;">✨ ${e}</span>`)
    ].filter(Boolean).join(' ');
    return `
      <div style="background:#1a1a1a;border:1px solid #222;border-radius:12px;padding:12px;margin-bottom:8px;">
        <div style="font-size:13px;color:#555;line-height:1.5;border-left:3px solid #333;padding-left:8px;margin-bottom:8px;white-space:pre-wrap;word-break:break-all;">${esc(v.text.slice(0,80))}${v.text.length>80?'…':''}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">${tags}</div>
        ${a.structure ? `<div style="font-size:11px;color:#555;">構造: ${a.structure}</div>` : ''}
        <div style="text-align:right;margin-top:6px;">
          <button onclick="deleteViral(${v.id})" style="padding:3px 10px;border-radius:8px;border:1px solid #ff444433;background:transparent;color:#ff6666;font-size:11px;cursor:pointer;">削除</button>
        </div>
      </div>`;
  }).join('');
}

async function deleteViral(id) {
  if (!confirm('このパターンを削除しますか？')) return;
  viralExamples = viralExamples.filter(v => v.id !== id);
  await saveViral();
  renderViral();
  showToast('削除しました');
}

function setViralStatus(msg, type='') {
  const el = document.getElementById('viral-status');
  el.textContent = msg;
  el.style.color = type === 'error' ? '#f4212e' : type === 'success' ? '#00ba7c' : '#71767b';
}

// ---- 投稿承認 ----
let drafts = [], sha = '', currentSubTab = 'pending', hasChanges = false;

function saveGhToken() {
  const token = document.getElementById('gh-token-input').value.trim();
  if (!token) return;
  localStorage.setItem('chacha_gh_token', token);
  document.getElementById('gh-token-area').style.display = 'none';
  loadDrafts();
}

async function loadDrafts() {
  document.getElementById('draft-list').innerHTML = '<div class="loading-msg">読み込み中...</div>';
  const token = localStorage.getItem('chacha_gh_token');
  if (!token) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    const data = await res.json();
    sha = data.sha;
    const decoded = new TextDecoder('utf-8').decode(Uint8Array.from(atob(data.content.replace(/\n/g,'')), c=>c.charCodeAt(0)));
    drafts = JSON.parse(decoded);
    renderDrafts(); updateStats();
  } catch(e) {
    document.getElementById('draft-list').innerHTML = '<div class="loading-msg">読み込みに失敗しました</div>';
  }
}

function updateStats() {
  const p=drafts.filter(d=>d.status==='pending').length;
  const a=drafts.filter(d=>d.status==='approved').length;
  const posted=drafts.filter(d=>d.status==='posted').length;
  document.getElementById('stats-bar').textContent=`未承認${p} / 承認済${a} / 投稿済${posted}`;
}

function switchSubTab(tab) {
  currentSubTab=tab;
  document.querySelectorAll('.sub-tab').forEach((t,i)=>t.classList.toggle('active',['pending','approved','posted'][i]===tab));
  renderDrafts();
}

function renderDrafts() {
  const list=document.getElementById('draft-list');
  const filtered=drafts.filter(d=>d.status===currentSubTab).slice().reverse();
  if(!filtered.length){list.innerHTML='<div class="empty-msg">該当する投稿はありません</div>';return;}
  list.innerHTML=filtered.map(d=>`
    <div class="draft-card ${d.status}" id="card-${d.id}">
      <div class="draft-meta">
        <span>#${d.id} <span class="badge badge-${d.status}">${{pending:'未承認',approved:'承認済',posted:'投稿済'}[d.status]}</span></span>
        <span>${d.created_at?d.created_at.slice(0,10):''}</span>
      </div>
      <div class="draft-text" id="dtext-${d.id}">${esc(d.text)}</div>
      <textarea class="draft-edit" id="dedit-${d.id}">${esc(d.text)}</textarea>
      <div class="card-actions">
        ${d.status==='pending'?`<button class="ca-btn ca-approve" onclick="approve(${d.id})">承認</button>`:''}
        ${d.status==='approved'?`<button class="ca-btn ca-unapprove" onclick="unapprove(${d.id})">取消</button>`:''}
        ${d.status!=='posted'?`<button class="ca-btn ca-edit" id="ebtn-${d.id}" onclick="toggleEdit(${d.id})">編集</button>`:''}
        ${d.status!=='posted'?`<button class="ca-btn ca-delete" onclick="deleteDraft(${d.id})">削除</button>`:''}
      </div>
    </div>`).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function approve(id){const d=drafts.find(x=>x.id===id);if(d){d.status='approved';markChanged();renderDrafts();updateStats();}}
function unapprove(id){const d=drafts.find(x=>x.id===id);if(d){d.status='pending';markChanged();renderDrafts();updateStats();}}
function deleteDraft(id){if(!confirm('この投稿を削除しますか？'))return;drafts=drafts.filter(x=>x.id!==id);markChanged();renderDrafts();updateStats();}
function toggleEdit(id){
  const t=document.getElementById(`dtext-${id}`),e=document.getElementById(`dedit-${id}`),b=document.getElementById(`ebtn-${id}`);
  if(e.style.display==='block'){const d=drafts.find(x=>x.id===id);const v=e.value.trim();if(d&&v!==d.text){d.text=v;t.innerHTML=esc(v);markChanged();}e.style.display='none';t.style.display='block';b.textContent='編集';}
  else{e.style.display='block';t.style.display='none';b.textContent='保存';}
}
function markChanged(){
  hasChanges=true;
  document.getElementById('save-bar').classList.add('visible');
  document.getElementById('save-bar-text').textContent=`承認済み ${drafts.filter(d=>d.status==='approved').length}件`;
}
async function saveAll(){
  const token=localStorage.getItem('chacha_gh_token');
  if(!token)return;
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(drafts,null,2))));
    const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'chore: 投稿を承認',content,sha})
    });
    if(res.ok){const data=await res.json();sha=data.content.sha;hasChanges=false;document.getElementById('save-bar').classList.remove('visible');showToast('保存しました！');}
    else{showToast('保存に失敗しました');}
  }catch(e){showToast('エラーが発生しました');}
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
